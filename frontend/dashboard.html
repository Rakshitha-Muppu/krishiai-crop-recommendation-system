<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KrishiAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="container">

<header class="main-header">

    <div class="logo">
        🌾 KrishiAI
    </div>

    <nav class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="crop_recommendation.html">Crop Recommendation</a>
        <a href="yield_prediction.html">Yield Prediction</a>
        <a href="history.html">History</a>
    </nav>

    <div class="user-section">
        <span class="user-name">👤 Ramesh Kumar</span>
        <a href="signup_login.html" class="logout-btn">Logout</a>
    </div>

</header>

<div class="welcome-card">
    <h2>Welcome, Ramesh Kumar 👋</h2>

    <div class="location" id="user-location"></div>
</div>

<div class="stats">

    <div class="stat-card">
        <h3 id="temperatureCard">32°C</h3>
        <p>🌡 Temperature</p>
    </div>

    <div class="stat-card">
        <h3 id="humidityCard">68%</h3>
        <p>💧 Humidity</p>
    </div>

    <div class="stat-card">
        <h3 id="rainfallCard">120 mm</h3>
        <p>🌧 Rainfall</p>
    </div>

</div>

<div class="actions">

    <button class="action-btn" onclick="window.location.href='crop_recommendation.html'">
        🌾 Recommend Best Crop
    </button>

    <button class="action-btn" onclick="window.location.href='yield_prediction.html'">
        📈 Predict Yield
    </button>

</div>

<div class="history">

    <h3>Recent Predictions</h3>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Crop</th>
                <th>Yield</th>
            </tr>
        </thead>
        <tbody id="recentPredictionsTable">
            <!-- Rows will be populated dynamically -->
        </tbody>
    </table>

</div>

</div>
<script src="js/dashboard.js"></script>
</body>
</html>
