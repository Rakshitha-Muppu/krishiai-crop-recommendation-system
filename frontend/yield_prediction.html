<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yield Prediction | KrishiAI</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/yield_prediction.css">

</head>

<body>

    <div class="container">

        <header class="main-header">

            <div class="logo">
                🌾 KrishiAI
            </div>

            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="crop_recommendation.html">Crop Recommendation</a>
                <a href="yield_prediction.html" class="active">Yield Prediction</a>
                <a href="history.html">History</a>
            </nav>

            <div class="user-section">
    <span class="user-name">👤 User</span>
    <a href="signup_login.html" class="logout-btn">Logout</a>
</div>

        </header>

        <h1 class="page-title">
            📈 Yield Prediction System
        </h1>

        <div class="predict-card">

            <div class="info-grid">

                <div class="info-box">
                    <strong>📍 Location</strong>
                    <span id="locationInfo"></span>
                </div>

                <div class="info-box">
                    <strong>🌱 Land Size</strong>
                    <span id="landInfo"></span>
                </div>

                <div class="info-box">
                    <strong>🌡 Temperature</strong>
                    <span id="temperatureInfo"></span>
                </div>

                <div class="info-box">
                    <strong>🌧 Rainfall</strong>
                    <span id="rainfallInfo"></span>
                </div>
                

            </div>

            <div class="form-group">

                <label>Select Recommended Crop</label>

                <select id="crop">
                    <option value="">Choose Crop</option>
                    <option>Rice</option>
                    <option>Cotton</option>
                    <option>Maize</option>
                    <option>Wheat</option>
                    <option>Sugarcane</option>
                </select>

            </div>

            <button class="btn" onclick="predictYield()">
                📈 Predict Yield
            </button>

            <div class="result-box" id="resultBox">

                <h3>Yield Prediction Result</h3>

                <div class="result-item">
                    <strong>Selected Crop:</strong>
                    <span id="cropResult"></span>
                </div>

                <div class="result-item">
                    <strong>Predicted Yield per Acre:</strong>
                    <span id="acreYield"></span>
                </div>

                <div class="result-item">
                    <strong>Estimated Production:</strong>
                    <span id="totalProduction"></span>
                </div>

                <div class="result-item">
                    <strong>Confidence Score:</strong>
                    <span id="confidence"></span>
                </div>

            </div>
            <script src="js/yield_prediction.js"></script>
</body>

</html>
